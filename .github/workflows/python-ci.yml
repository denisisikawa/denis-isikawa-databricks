name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m pytest --cov=fp-cost-forecast --cov-report=xml
      - name: Upload coverage to Codecov (bash uploader, non-fatal)
        run: |
          echo "Uploading coverage to Codecov (best-effort)"
          curl -s https://codecov.io/bash -o codecov_uploader.sh || true
          bash codecov_uploader.sh -f coverage.xml || echo "Codecov upload failed — continuing"
